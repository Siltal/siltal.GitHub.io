><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br></pre></div></td><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">import</span> math<br><span class="hljs-keyword">from</span> PIL <span class="hljs-keyword">import</span> Image<br><span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt<br><br>img = Image.<span class="hljs-built_in">open</span>(<span class="hljs-string">&quot;CNN.png&quot;</span>) <span class="hljs-comment"># 打开为图像对象</span><br>img = img.convert(<span class="hljs-string">&quot;1&quot;</span>) <span class="hljs-comment"># 转灰度图</span><br><br>raw = img.load() <span class="hljs-comment"># 加载图像矩阵</span><br><br>pngV = [[raw[w, h] <span class="hljs-keyword">for</span> w <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(img.size[<span class="hljs-number">1</span>])] <span class="hljs-keyword">for</span> h <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(img.size[<span class="hljs-number">0</span>])] <span class="hljs-comment"># 转为一个宽高相同的二维数组用来存放灰度值</span><br><br>kernel = [  <span class="hljs-comment">#卷积核</span><br>    [<span class="hljs-number">0</span>, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>],<br>    [<span class="hljs-number">0</span>, <span class="hljs-number">1</span>, <span class="hljs-number">0</span>],<br>    [<span class="hljs-number">1</span>, <span class="hljs-number">0</span>, <span class="hljs-number">1</span>],<br>]<br><br>kernel1 = [ <span class="hljs-comment">#无用的卷积核</span><br>    [<span class="hljs-number">1</span>]<br>]<br><br><br><span class="hljs-function"><span class="hljs-keyword">def</span> <span class="hljs-title">conv</span>(<span class="hljs-params">v, w, step=<span class="hljs-number">1</span>, pad=<span class="hljs-number">0</span>, fill_value=<span class="hljs-number">1</span>, bias=<span class="hljs-number">0</span></span>):</span><span class="hljs-comment">#卷积过程，参数：灰度矩阵，权重（卷积核），步长，边缘填充，边缘填充的值，偏置</span><br>    v_row = <span class="hljs-built_in">len</span>(v)<br>    v_col = <span class="hljs-built_in">len</span>(v[<span class="hljs-number">0</span>])<br>    <span class="hljs-keyword">if</span> pad:<br>        <span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(pad):<span class="hljs-comment">#上边缘填充</span><br>            v.insert(<span class="hljs-number">0</span>, [fill_value <span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(v_col + pad * <span class="hljs-number">2</span>)])<br>        <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(pad, v_row + pad):<span class="hljs-comment">#中间两侧边缘填充</span><br>            <span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(pad):<br>                v[i].insert(<span class="hljs-number">0</span>, fill_value)<br>                v[i].append(fill_value)<br>        <span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(pad):<span class="hljs-comment">#下边缘填充</span><br>            v.append([fill_value <span class="hljs-keyword">for</span> _ <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(v_col + pad * <span class="hljs-number">2</span>)])<br>        v_row += pad * <span class="hljs-number">2</span><br>        v_col += pad * <span class="hljs-number">2</span><br><br>    w_row = <span class="hljs-built_in">len</span>(w)<br>    w_col = <span class="hljs-built_in">len</span>(w[<span class="hljs-number">0</span>])<br>    res = []<br>    <span class="hljs-keyword">for</span> x <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(w_row // <span class="hljs-number">2</span>, v_row - w_row // <span class="hljs-number">2</span>, step):<span class="hljs-comment">#受卷积核宽高的影响需要计算起止位置</span><br>        line = []<br>        <span class="hljs-keyword">for</span> y <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(w_col // <span class="hljs-number">2</span>, v_col - w_col // <span class="hljs-number">2</span>, step):<br>            temp = <span class="hljs-number">0</span><br>            <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(w_row):<br>                <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(w_col):<br>                    t = v[x + i - w_row // <span class="hljs-number">2</span>][y + j - w_col // <span class="hljs-number">2</span>] * w[i][j] <span class="hljs-comment"># 灰度 乘 权重</span><br>                    temp += t <span class="hljs-comment"># 累加乘积</span><br>            temp += bias <span class="hljs-comment"># 加偏置</span><br>            line.append(temp)<br>        res.append(line)<br>    <span class="hljs-keyword">return</span> res<br><br><span class="hljs-function"><span class="hljs-keyword">def</span> <span class="hljs-title">relu</span>(<span class="hljs-params">v</span>):</span> <span class="hljs-comment"># 线性整流函数</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-built_in">len</span>(v)):<br>        <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-built_in">len</span>(v[i])):<br>            v[i][j]=v[i][j] <span class="hljs-keyword">if</span> v[i][j] &gt; <span class="hljs-number">0</span> <span class="hljs-keyword">else</span> <span class="hljs-number">0</span><br>    <span class="hljs-keyword">return</span> v<br><br><span class="hljs-function"><span class="hljs-keyword">def</span> <span class="hljs-title">max_pooling</span>(<span class="hljs-params">v,size=<span class="hljs-number">2</span></span>):</span> <span class="hljs-comment"># 最大池化</span><br>    v_row = math.ceil(<span class="hljs-built_in">len</span>(v) / size)<br>    v_col = math.ceil(<span class="hljs-built_in">len</span>(v[<span class="hljs-number">0</span>]) / size)<br>    r = []<br>    <span class="hljs-keyword">for</span> y <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(v_row):<br>        line = []<br>        <span class="hljs-keyword">for</span> x <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(v_col):<br>            compare = []<br>            <span class="hljs-keyword">for</span> j <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(y*size, y*size + size <span class="hljs-keyword">if</span> y*size + size &lt; <span class="hljs-built_in">len</span>(v) <span class="hljs-keyword">else</span> <span class="hljs-built_in">len</span>(v)): <span class="hljs-comment"># 防止边缘越界</span><br>                <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(x*size, x*size + size <span class="hljs-keyword">if</span> x*size+size &lt; <span class="hljs-built_in">len</span>(v) <span class="hljs-keyword">else</span> <span class="hljs-built_in">len</span>(v[<span class="hljs-number">0</span>])):<br>                    compare.append(v[j][i])<br>            line.append(<span class="hljs-built_in">max</span>(compare))<br>        r.append(line)<br>    <span class="hljs-keyword">return</span> r<br><br><br><br><span class="hljs-keyword">if</span> __name__ == <span class="hljs-string">&#x27;__main__&#x27;</span>:<br>    v = conv(pngV, kernel, step=<span class="hljs-number">9</span>, pad=<span class="hljs-number">0</span>, bias=-<span class="hljs-number">763</span>)<br>    v = relu(v)<br>    v = max_pooling(v)<br>    plt.imshow(v)<br>    plt.show()<br>    plt.imsave(<span class="hljs-string">&quot;2.png&quot;</span>, v)<br><br></code></pre></td></tr></table></figure>

    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']]
        },
        loader: {
          load: ['ui/lazy']
        },
        options: {
          renderActions: {
            findScript: [10, doc => {
              document.querySelectorAll('script[type^="math/tex"]').forEach(node => {
                const display = !!node.type.match(/; *mode=display/);
                const math = new doc.options.MathItem(node.textContent, doc.inputJax[0], display);
                const text = document.createTextNode('');
                node.parentNode.replaceChild(text, node);
                math.start = { node: text, delim: '', n: 0 };
                math.end = { node: text, delim: '', n: 0 };
                doc.math.push(math);
              });
            }, '', false],
            insertedScript: [200, () => {
              document.querySelectorAll('mjx-container').forEach(node => {
                let target = node.parentNode;
                if (target.nodeName.toLowerCase() === 'li') {
                  target.parentNode.classList.add('has-jax');
                }
              });
            }, '', false]
          }
        }
      };
    </script>
